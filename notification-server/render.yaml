services:
  - type: web
    name: callingapp-notification-server
    runtime: node
    plan: free
    rootDir: notification-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: SERVER_API_KEY
        generateValue: true
      - key: RATE_LIMIT_PER_MIN
        value: "30"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_FOLDER
        value: callingapp
      - key: CLOUDINARY_MAX_FILE_MB
        value: "50"
